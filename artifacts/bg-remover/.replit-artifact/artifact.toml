kind = "web"
previewPath = "/"
title = "BGRemover AI"
version = "1.0.0"
id = "artifacts/bg-remover"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25465

[services.development]
run = "pnpm --filter @workspace/bg-remover run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bg-remover", "run", "build" ]
publicDir = "artifacts/bg-remover/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25465"
BASE_PATH = "/"
